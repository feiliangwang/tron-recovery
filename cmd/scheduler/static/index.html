<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boon - TRON 助记词枚举</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #22d3ee; font-size: 1.8em; }

        /* 状态栏 */
        .status-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .status-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .status-value {
            font-size: 28px;
            font-weight: 700;
            color: #22d3ee;
        }
        .status-label {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* 创建任务 */
        .create-form {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 200px;
            gap: 16px;
            margin-bottom: 12px;
        }
        .form-row.full { grid-template-columns: 1fr; }
        label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 13px; }
        input {
            width: 100%; padding: 10px 14px; border: 1px solid #334155;
            border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 14px;
        }
        input:focus { outline: none; border-color: #22d3ee; }
        .batch-hint {
            font-size: 12px; color: #64748b; margin-top: 6px; text-align: center;
        }
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .btn-primary { background: #0891b2; color: white; }
        .btn-primary:hover { background: #06b6d4; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #d97706; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-small { padding: 6px 12px; font-size: 12px; }

        /* 两栏布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 24px;
        }

        /* 任务列表 */
        .section-title {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px;
        }
        .job-card {
            background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 12px;
        }
        .job-header {
            display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px;
        }
        .job-name { font-size: 16px; font-weight: 600; color: #f1f5f9; }
        .job-status {
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500;
        }
        .status-pending { background: #334155; color: #94a3b8; }
        .status-running { background: #0891b2; color: white; }
        .status-paused { background: #d97706; color: white; }
        .status-completed { background: #16a34a; color: white; }

        .job-mnemonic {
            background: #0f172a; padding: 10px; border-radius: 6px;
            font-family: monospace; font-size: 12px; margin-bottom: 12px;
            color: #94a3b8; word-break: break-all;
        }
        .progress-bar {
            height: 6px; background: #334155; border-radius: 3px;
            overflow: hidden; margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #0891b2, #22d3ee);
            transition: width 0.3s;
        }
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px 16px;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .stat-value { color: #f1f5f9; font-weight: 500; }
        .job-actions { display: flex; gap: 6px; margin-top: 12px; }

        /* Workers 面板 */
        .workers-panel {
            background: #1e293b; border-radius: 12px; padding: 16px;
        }
        .worker-card {
            background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 8px;
            border-left: 3px solid transparent;
            transition: border-color 0.3s;
        }
        .worker-card.online { border-left-color: #4ade80; }
        .worker-card.offline { border-left-color: #f87171; }
        .worker-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .worker-id {
            font-weight: 600; font-size: 13px;
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .worker-badge {
            padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500;
        }
        .badge-online { background: #14532d; color: #4ade80; }
        .badge-offline { background: #450a0a; color: #f87171; }

        /* Worker 速度显示 */
        .worker-speed-row {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        }
        .worker-speed-label { font-size: 11px; color: #64748b; flex-shrink: 0; }
        .worker-speed-value {
            font-size: 16px; font-weight: 700; color: #22d3ee; flex-shrink: 0;
        }
        .speed-bar-wrap {
            flex: 1; height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden;
        }
        .speed-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0891b2, #22d3ee);
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .worker-meta {
            display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
            font-size: 11px; color: #64748b;
        }
        .worker-meta span { color: #94a3b8; }
        .worker-meta b { color: #cbd5e1; }

        /* 匹配结果 */
        .matches-panel {
            background: #1e293b; border-radius: 12px; padding: 16px; margin-top: 24px;
        }
        /* 确认成功 - 独立栏目 */
        .confirmed-panel {
            background: #052e16; border: 1px solid #16a34a;
            border-radius: 12px; padding: 16px; margin-top: 24px;
        }
        .confirmed-panel .section-title h3 { color: #4ade80; }
        .confirmed-item {
            background: #0f172a; border: 1px solid #16a34a;
            padding: 14px; border-radius: 8px; margin-bottom: 8px;
            font-family: monospace; font-size: 12px;
        }
        .confirmed-item .match-address { color: #4ade80; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
        .confirmed-item .match-create-time { color: #86efac; font-size: 11px; margin-bottom: 4px; }
        .confirmed-item .match-mnemonic { color: #94a3b8; font-size: 11px; word-break: break-all; }
        .match-item {
            background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 8px;
            font-family: monospace; font-size: 12px;
        }
        .match-address { color: #22d3ee; margin-bottom: 4px; }
        .match-mnemonic { color: #94a3b8; font-size: 11px; word-break: break-all; }
        .match-confirm-badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 10px; font-weight: 600; margin-bottom: 6px;
        }
        .badge-pending  { background: #1e293b; color: #94a3b8; }
        .badge-active   { background: #14532d; color: #4ade80; }
        .badge-inactive { background: #1c1917; color: #78716c; }
        .badge-error    { background: #431407; color: #fb923c; }

        .empty-state { text-align: center; padding: 30px; color: #64748b; font-size: 13px; }

        /* 刷新指示器 */
        .refresh-indicator {
            position: fixed; top: 20px; right: 20px;
            background: #0891b2; color: white; padding: 8px 16px;
            border-radius: 20px; font-size: 12px; opacity: 0;
            transition: opacity 0.3s;
        }
        .refresh-indicator.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍉 Boon - TRON 助记词枚举</h1>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-card">
                <div class="status-value" id="stat-workers">0</div>
                <div class="status-label">在线 Workers</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="stat-speed">0</div>
                <div class="status-label">总枚举速度 /s</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="stat-completed">0</div>
                <div class="status-label">已完成</div>
            </div>
            <div class="status-card">
                <div class="status-value" id="stat-matches">0</div>
                <div class="status-label">匹配数</div>
            </div>
        </div>

        <!-- 创建任务 -->
        <div class="create-form">
            <div class="form-row">
                <div>
                    <label>任务名称</label>
                    <input type="text" id="job-name" placeholder="例如: 钱包A恢复">
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button class="btn btn-primary" style="width:100%" onclick="createJob()">创建任务</button>
                </div>
            </div>
            <div class="form-row full">
                <label>助记词模板（未知词用 ? 代替）</label>
                <input type="text" id="mnemonic" placeholder="例如: word1 ? ? word4 word5 word6 word7 word8 word9 word10 word11 word12">
            </div>
            <div class="batch-hint">💡 批次大小由调度器根据各 Worker 实时枚举速度自动分配，目标每批约 30 秒工作量</div>
        </div>

        <!-- 主内容 -->
        <div class="main-grid">
            <!-- 左侧：任务列表 -->
            <div>
                <div class="section-title">
                    <h2>任务列表</h2>
                </div>
                <div id="jobs-grid"></div>

                <!-- 确认成功（已激活账户）-->
                <div class="confirmed-panel" id="confirmed-panel" style="display:none">
                    <div class="section-title">
                        <h3>🏆 已激活账户</h3>
                        <span id="confirmed-count" style="color: #4ade80; font-size: 13px;"></span>
                    </div>
                    <div id="confirmed-list"></div>
                </div>

                <!-- 匹配结果 -->
                <div class="matches-panel">
                    <div class="section-title">
                        <h3>🎯 匹配结果</h3>
                        <span id="match-count" style="color: #94a3b8; font-size: 13px;"></span>
                    </div>
                    <div id="matches-list"></div>
                </div>
            </div>

            <!-- 右侧：Workers -->
            <div class="workers-panel">
                <div class="section-title">
                    <h3>👷 Workers</h3>
                    <span id="worker-count" style="color: #94a3b8; font-size: 13px;"></span>
                </div>
                <div id="workers-list"></div>
            </div>
        </div>
    </div>

    <div class="refresh-indicator" id="refresh-indicator">刷新中...</div>

    <script>
        // 记录各 Worker 历史最高速度，用于绘制相对进度条
        const peakSpeeds = {};

        async function fetchAPI(path) {
            const res = await fetch('/api' + path);
            return res.json();
        }

        async function refresh() {
            const indicator = document.getElementById('refresh-indicator');
            indicator.classList.add('show');

            try {
                const [stats, workersData] = await Promise.all([
                    fetchAPI('/stats'),
                    fetchAPI('/workers'),
                ]);

                const workers = workersData.workers || [];

                // 状态栏
                const onlineCount = workers.filter(w => isOnline(w)).length;
                document.getElementById('stat-workers').textContent = onlineCount;
                document.getElementById('stat-completed').textContent = formatNum(stats.completed || 0);
                document.getElementById('stat-matches').textContent = stats.matches || 0;

                // 总速度 = 各在线 Worker 速度之和
                const totalSpeed = workers
                    .filter(w => isOnline(w))
                    .reduce((sum, w) => sum + (w.speed || 0), 0);
                document.getElementById('stat-speed').textContent = formatNum(totalSpeed);

                // 刷新任务
                await refreshJobs();

                // 刷新 Workers（传入总速度供进度条参考）
                renderWorkers(workers);

                // 刷新匹配
                await refreshMatches();

            } finally {
                setTimeout(() => indicator.classList.remove('show'), 300);
            }
        }

        function isOnline(w) {
            return w.last_seen && (Date.now() - new Date(w.last_seen).getTime()) < 60000;
        }

        async function refreshJobs() {
            const data = await fetchAPI('/jobs');
            const jobs = data.jobs || [];
            const grid = document.getElementById('jobs-grid');

            if (jobs.length === 0) {
                grid.innerHTML = '<div class="empty-state">暂无任务，请创建</div>';
                return;
            }

            grid.innerHTML = jobs.map(job => {
                const progress = job.total > 0 ? (job.completed / job.total * 100).toFixed(2) : 0;
                const statusClass = 'status-' + job.status;

                // 运行时长
                const elapsed = job.elapsed_seconds > 0 ? formatDuration(job.elapsed_seconds) : '-';

                // 预计完成
                let eta = '-';
                if (job.status === 'running') {
                    if (job.eta_seconds >= 0) {
                        eta = job.eta_seconds === 0 ? '即将完成' : formatDuration(job.eta_seconds);
                    } else {
                        eta = '计算中...';
                    }
                } else if (job.status === 'completed') {
                    eta = '已完成';
                }

                // 当前速度
                const speed = job.speed > 0 ? formatNum(job.speed) + '/s' : '-';

                let actions = '';
                if (job.status === 'pending') {
                    actions = `<button class="btn btn-small btn-success" onclick="startJob('${job.id}')">启动</button>`;
                } else if (job.status === 'running') {
                    actions = `<button class="btn btn-small btn-warning" onclick="pauseJob('${job.id}')">暂停</button>`;
                } else if (job.status === 'paused') {
                    actions = `<button class="btn btn-small btn-success" onclick="resumeJob('${job.id}')">恢复</button>`;
                }
                actions += `<button class="btn btn-small btn-danger" onclick="deleteJob('${job.id}')">删除</button>`;

                return `
                    <div class="job-card">
                        <div class="job-header">
                            <div class="job-name">${job.name || job.id}</div>
                            <span class="job-status ${statusClass}">${job.status}</span>
                        </div>
                        <div class="job-mnemonic">${job.mnemonic}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="progress-stats">
                            <span>进度: <span class="stat-value">${progress}%</span></span>
                            <span>已完成: <span class="stat-value">${formatNum(job.completed)}</span></span>
                            <span>总计: <span class="stat-value">${formatNum(job.total)}</span></span>
                            <span>速度: <span class="stat-value">${speed}</span></span>
                            <span>运行时长: <span class="stat-value">${elapsed}</span></span>
                            <span>预计完成: <span class="stat-value">${eta}</span></span>
                            <span>匹配: <span class="stat-value">${job.matches || 0}</span></span>
                        </div>
                        <div class="job-actions">${actions}</div>
                    </div>
                `;
            }).join('');
        }

        function renderWorkers(workers) {
            const list = document.getElementById('workers-list');
            document.getElementById('worker-count').textContent = `${workers.length} 个`;

            if (workers.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无Worker连接</div>';
                return;
            }

            // 更新峰值速度记录（用于进度条比例）
            workers.forEach(w => {
                const s = w.speed || 0;
                if (s > (peakSpeeds[w.id] || 0)) peakSpeeds[w.id] = s;
            });
            const globalPeak = Math.max(...Object.values(peakSpeeds), 1);

            list.innerHTML = workers.map(w => {
                const online = isOnline(w);
                const speed = w.speed || 0;
                const barPct = Math.min(100, Math.round(speed / globalPeak * 100));
                // 根据速度估算当前批次大小（speed × 30）
                const batchEst = speed > 0 ? formatNum(speed * 30) : '-';

                return `
                    <div class="worker-card ${online ? 'online' : 'offline'}">
                        <div class="worker-header">
                            <span class="worker-id" title="${w.id}">${w.id}</span>
                            <span class="worker-badge ${online ? 'badge-online' : 'badge-offline'}">
                                ${online ? '🟢 在线' : '🔴 离线'}
                            </span>
                        </div>
                        <div class="worker-speed-row">
                            <span class="worker-speed-label">速度</span>
                            <span class="worker-speed-value">${formatNum(speed)}/s</span>
                            <div class="speed-bar-wrap">
                                <div class="speed-bar-fill" style="width:${barPct}%"></div>
                            </div>
                        </div>
                        <div class="worker-meta">
                            <span>任务数: <b>${w.tasks_done || 0}</b></span>
                            <span>批次: <b>~${batchEst}</b></span>
                            <span>最后活跃: <b>${formatTime(w.last_seen)}</b></span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function refreshMatches() {
            const data = await fetchAPI('/matches');
            const matches = data.matches || [];

            // 分类：已激活 / 全部
            const confirmed = matches.filter(m => m.confirmed === true);
            const allRecent = matches.slice(-20).reverse();

            // 统计
            document.getElementById('match-count').textContent = `${matches.length} 个`;

            // --- 已激活账户栏 ---
            const confirmedPanel = document.getElementById('confirmed-panel');
            const confirmedList  = document.getElementById('confirmed-list');
            if (confirmed.length > 0) {
                confirmedPanel.style.display = '';
                document.getElementById('confirmed-count').textContent = `${confirmed.length} 个`;
                confirmedList.innerHTML = confirmed.map(m => {
                    const ct = m.create_time > 0
                        ? new Date(m.create_time).toLocaleString()
                        : '';
                    return `
                        <div class="confirmed-item">
                            <div class="match-address">🏆 ${m.address}</div>
                            ${ct ? `<div class="match-create-time">创建时间: ${ct}</div>` : ''}
                            <div class="match-mnemonic">${m.mnemonic}</div>
                        </div>`;
                }).join('');
            } else {
                confirmedPanel.style.display = 'none';
            }

            // --- 全部匹配列表 ---
            const list = document.getElementById('matches-list');
            if (matches.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无匹配</div>';
                return;
            }

            list.innerHTML = allRecent.map(m => {
                let badge, badgeClass;
                if (m.confirm_err) {
                    badge = '⚠️ 查询失败'; badgeClass = 'badge-error';
                } else if (m.confirmed === null || m.confirmed === undefined) {
                    badge = '⏳ 待确认'; badgeClass = 'badge-pending';
                } else if (m.confirmed === true) {
                    badge = '✅ 已激活'; badgeClass = 'badge-active';
                } else {
                    badge = '⬜ 未激活'; badgeClass = 'badge-inactive';
                }
                return `
                    <div class="match-item">
                        <div><span class="match-confirm-badge ${badgeClass}">${badge}</span></div>
                        <div class="match-address">${m.address}</div>
                        <div class="match-mnemonic">${m.mnemonic}</div>
                    </div>`;
            }).join('');
        }

        async function createJob() {
            const name = document.getElementById('job-name').value;
            const mnemonic = document.getElementById('mnemonic').value;
            if (!mnemonic) { alert('请输入助记词模板'); return; }

            await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, mnemonic })
            });

            document.getElementById('job-name').value = '';
            document.getElementById('mnemonic').value = '';
            refresh();
        }

        async function startJob(id) {
            await fetch('/api/jobs/' + id + '/start', { method: 'POST' });
            refresh();
        }

        async function pauseJob(id) {
            await fetch('/api/jobs/' + id + '/pause', { method: 'POST' });
            refresh();
        }

        async function resumeJob(id) {
            await fetch('/api/jobs/' + id + '/resume', { method: 'POST' });
            refresh();
        }

        async function deleteJob(id) {
            if (!confirm('确定删除？')) return;
            await fetch('/api/jobs/' + id, { method: 'DELETE' });
            refresh();
        }

        function formatDuration(secs) {
            secs = Math.floor(secs);
            if (secs < 60) return secs + '秒';
            const m = Math.floor(secs / 60) % 60;
            const h = Math.floor(secs / 3600);
            const s = secs % 60;
            if (h > 0) return h + '小时' + m + '分';
            return m + '分' + s + '秒';
        }

        function formatNum(n) {
            if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toString();
        }

        function formatTime(t) {
            if (!t) return '-';
            const d = new Date(t);
            const diff = (Date.now() - d) / 1000;
            if (diff < 60) return Math.floor(diff) + '秒前';
            if (diff < 3600) return Math.floor(diff / 60) + '分前';
            return d.toLocaleTimeString();
        }

        // 启动自动刷新
        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
